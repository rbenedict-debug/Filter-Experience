@let currentView = view();

<div class="ds-page-content__heading">
  <h1 class="ds-page-content__title">{{ currentView?.name ?? 'Saved View' }}</h1>
</div>

<div class="ds-page-content__main ds-page-content__main--table"
     [attr.data-panel-open]="settingsActive || null">

  <ds-table-toolbar
    [showActions]="false"
    [showDownload]="false"
    [searchPlaceholder]="'Search tickets'"
    [(filterActive)]="filterOpen"
    [(settingsActive)]="settingsActive"
    (settingsActiveChange)="onSettingsToggle($event)"
    (filterActiveChange)="onFilterToggle($event)"
  >
    <button toolbar-extra
      class="ds-button ds-button--filled"
      type="button"
      (click)="onAdvancedSearch()"
    >Advanced Search</button>
    <button toolbar-trailing
      class="ds-table-toolbar__text-btn"
      type="button"
      (click)="onEditView()"
    >Edit View</button>
  </ds-table-toolbar>

  <div
    class="filter-applied-bar"
    id="filter-applied-bar"
    [hidden]="filterCount === 0"
    [class.is-collapsed]="filterBarCollapsed()"
  >
    <span class="ds-label ds-label--brand ds-label--pill ds-label--sm filter-bar__count-chip"
          aria-hidden="true"
          (click)="toggleFilterBar()">{{ filterCount }} active filters</span>
    <div class="filter-applied-bar__cards" id="filter-applied-cards"
         role="group" aria-label="Applied filters"></div>
    <button
      class="filter-bar__toggle"
      type="button"
      [attr.aria-expanded]="!filterBarCollapsed()"
      [attr.aria-label]="filterBarCollapsed() ? 'Show filters, ' + filterCount + ' active' : 'Hide filters'"
      (click)="toggleFilterBar()"
    >
      {{ filterBarCollapsed() ? 'Show filters' : 'Hide filters' }}
      <span class="ds-icon ds-icon--sm filter-bar__toggle-arrow"
            [class.filter-bar__toggle-arrow--right]="filterBarCollapsed()"
            aria-hidden="true">arrow_drop_down</span>
    </button>
  </div>

  <app-filter-shell
    [(open)]="filterOpen"
    (filterCountChange)="onFilterCountChange($event)"
  />

  <div class="saved-view__table-placeholder">
    <span class="ds-icon ds-icon--xl" aria-hidden="true">table_rows</span>
    <span class="saved-view__placeholder-label">Table placeholder</span>
  </div>

</div>

<app-save-view-modal
  [(open)]="editViewOpen"
  mode="edit"
  [initialName]="currentView?.name ?? ''"
  [filterCount]="filterCount"
  (confirmed)="onEditViewConfirmed($event)"
  (deleted)="onDeleteView()"
/>
