<div class="ds-page-content__heading">
  <div class="ds-tabs" role="tablist" aria-label="Ticket views">
    <button
      class="ds-tabs__tab"
      [class.is-selected]="activeTab() === 'my-tickets'"
      role="tab"
      [attr.aria-selected]="activeTab() === 'my-tickets'"
      [attr.tabindex]="activeTab() === 'my-tickets' ? 0 : -1"
      aria-label="My Tickets, 12 new"
      (click)="setTab('my-tickets')"
    >My Tickets&nbsp;<span class="ds-badge-indicator" aria-hidden="true">12</span></button>
    <button
      class="ds-tabs__tab"
      [class.is-selected]="activeTab() === 'team'"
      role="tab"
      [attr.aria-selected]="activeTab() === 'team'"
      [attr.tabindex]="activeTab() === 'team' ? 0 : -1"
      aria-label="Team, 5 new"
      (click)="setTab('team')"
    >Team&nbsp;<span class="ds-badge-indicator" aria-hidden="true">5</span></button>
    <button
      class="ds-tabs__tab"
      [class.is-selected]="activeTab() === 'all'"
      role="tab"
      [attr.aria-selected]="activeTab() === 'all'"
      [attr.tabindex]="activeTab() === 'all' ? 0 : -1"
      (click)="setTab('all')"
    >All</button>
    <button
      class="ds-tabs__tab"
      [class.is-selected]="activeTab() === 'closed'"
      role="tab"
      [attr.aria-selected]="activeTab() === 'closed'"
      [attr.tabindex]="activeTab() === 'closed' ? 0 : -1"
      (click)="setTab('closed')"
    >Closed</button>
  </div>
</div>
<div class="ds-page-content__main">
  <!-- Tickets feature content -->
</div>
